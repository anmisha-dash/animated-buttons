<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Buttons</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <h1 class="heading">Animated Buttons</h1>
    <p class="subheading">Hover over each button to see the effect</p>

    <div class="grid">

      <div class="group">
        <p class="label">Fill Slide</p>
        <button class="btn fill-slide">Hover Me</button>
      </div>

      <div class="group">
        <p class="label">Border Draw</p>
        <button class="btn border-draw">Hover Me</button>
      </div>

      <div class="group">
        <p class="label">Lift Up</p>
        <button class="btn lift-up">Hover Me</button>
      </div>

      <div class="group">
        <p class="label">Pulse</p>
        <button class="btn pulse">Hover Me</button>
      </div>

      <div class="group">
        <p class="label">Shake</p>
        <button class="btn shake">Hover Me</button>
      </div>

      <div class="group">
        <p class="label">Color Shift</p>
        <button class="btn color-shift">Hover Me</button>
      </div>

      <div class="group">
        <p class="label">Underline</p>
        <button class="btn underline-btn">Hover Me</button>
      </div>

      <div class="group">
        <p class="label">Bounce</p>
        <button class="btn bounce-btn">Hover Me</button>
      </div>

    </div>
  </div>

</body>
</html>
